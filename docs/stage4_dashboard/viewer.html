<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MMdedup 数据查看器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">数据查看器</p>
      <h1 id="viewerTitle">正在读取数据...</h1>
      <p id="viewerSubtitle" class="claim">CSV 会显示为表格，JSON 会显示为结构化卡片。</p>
    </div>
    <div class="deadline">
      <span>查看原则</span>
      <strong>用于理解，不替代 source-of-truth</strong>
      <small id="viewerPath">等待文件路径...</small>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-head">
        <h2>数据内容</h2>
        <span id="viewerMeta"></span>
      </div>
      <div id="viewerRoot" class="viewer-root"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>原始文件</h2>
        <span>用于追溯</span>
      </div>
      <div class="actions">
        <a id="rawLink" class="button primary" href="#">打开原始文件</a>
        <a class="button" href="index.html">回到进度面板</a>
        <a class="button" href="usage.html">网站使用说明</a>
      </div>
    </section>
  </main>

  <script src="viewer.js"></script>
</body>
</html>
